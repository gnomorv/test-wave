<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Execution Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#050505',
                            800: '#0a0a0a',
                            700: '#121212',
                            600: '#1c1c1c',
                        },
                        accent: {
                            400: '#38bdf8',
                            500: '#0ea5e9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --passed: #34a853;
            --failed: #ea4335;
            --blocked: #fbbc04;
            --retest: #9c27b0;
            --in-progress: #ff69b4;
            --untested: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
        }

        /* Background Effects */
        .bg-grid {
            background-image: linear-gradient(to right, #1f1f1f 1px, transparent 1px),
                              linear-gradient(to bottom, #1f1f1f 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, transparent, 5%, white, 95%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, 5%, white, 95%, transparent);
        }

        /* Dark Navbar */
        .dark-navbar {
            background: #050505;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-primary-dark {
            background: #38bdf8;
            color: #000;
            transition: all 0.3s ease;
        }

        .btn-primary-dark:hover {
            background: #7dd3fc;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        /* Glass Card Effect */
        .glass-card {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.1);
        }

        /* Stat Cards */
        .stat-card {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--untested);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 10px 40px rgba(56, 189, 248, 0.1);
        }

        .stat-card.passed::before { background: var(--passed); }
        .stat-card.failed::before { background: var(--failed); }
        .stat-card.blocked::before { background: var(--blocked); }
        .stat-card.in-progress::before { background: var(--in-progress); }
        .stat-card.total::before { background: #38bdf8; }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Chart Cards */
        .chart-card {
            background: rgba(18, 18, 18, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 28px;
            border-radius: 16px;
        }

        .chart-card h2 {
            font-size: 18px;
            margin-bottom: 24px;
            color: #fff;
            border-left: 4px solid #38bdf8;
            padding-left: 14px;
            font-weight: 600;
        }

        /* Feature Table */
        .feature-table {
            width: 100%;
            border-collapse: collapse;
        }

        .feature-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            text-align: left;
            font-size: 12px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .feature-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: #e2e8f0;
        }

        .feature-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .progress-mini {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            width: 120px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #34a853, #4ade80);
            border-radius: 4px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>

<body class="relative">

    <!-- Background Grid Effect -->
    <div class="fixed inset-0 z-0 bg-grid opacity-20 pointer-events-none"></div>

    <!-- Glow Effects -->
    <div class="fixed top-0 left-1/4 w-[500px] h-[500px] bg-accent-400/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-0 right-0 w-[600px] h-[600px] bg-blue-900/10 rounded-full blur-[100px] pointer-events-none"></div>

    <!-- Dark Navbar -->
    <nav class="dark-navbar w-full py-4 px-8 relative z-50">
        <div class="max-w-[1440px] mx-auto flex items-center justify-between">
            <!-- Logo & Project Name -->
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-3 text-gray-400 hover:text-white transition-colors">
                    <div class="w-8 h-8 bg-gradient-to-br from-accent-400 to-blue-600 rounded-lg flex items-center justify-center text-black font-bold text-lg">
                        <i class="fa-solid fa-layer-group text-sm"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">Test<span class="text-accent-400">Flow</span></span>
                </a>
                <div class="h-6 w-px bg-white/10 mx-2"></div>
                <div>
                    <h1 id="dashboardTitle" class="text-lg font-semibold text-white">Test Execution Dashboard</h1>
                    <p id="dashboardSubtitle" class="text-xs text-gray-500">Visual insights for your test cycle</p>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3">
                <a id="backToSheet" href="test_case_sheet.html" class="btn-primary-dark px-5 py-2.5 rounded-lg font-semibold text-sm flex items-center gap-2 transition-all">
                    <i class="fa-solid fa-table-list text-xs"></i> Test Cases
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 px-8 py-10">
        <div class="max-w-[1440px] mx-auto">

            <!-- Summary Cards -->
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-5 mb-10" id="summaryGrid">
                <!-- Summary cards will be injected here -->
            </div>

            <!-- Charts Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-10 charts-grid" style="grid-template-columns: 1fr 2fr;">
                <div class="chart-card">
                    <h2>Status Distribution</h2>
                    <canvas id="statusChart"></canvas>
                </div>
                <div class="chart-card">
                    <h2>Results by Feature Area</h2>
                    <canvas id="featureChart"></canvas>
                </div>
            </div>

            <!-- Feature Table -->
            <div class="chart-card">
                <h2>Detailed Feature Progress</h2>
                <div class="overflow-x-auto">
                    <table class="feature-table">
                        <thead>
                            <tr>
                                <th>Feature Module</th>
                                <th>Total Cases</th>
                                <th>Passed</th>
                                <th>Failed</th>
                                <th>% Passed</th>
                                <th>Progress</th>
                            </tr>
                        </thead>
                        <tbody id="featureTableBody">
                            <!-- Feature rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Get project from URL
        const urlParams = new URLSearchParams(window.location.search);
        const currentProject = urlParams.get('project') || 'default';

        // Project name mapping
        const projectNames = {
            'wiseloan': 'Wiseloan',
            'rv-website': 'RV Website',
            'dlc': 'DLC',
            '360-connect': '360 Connect',
            'cowboys': 'Cowboys',
            'bbcom': 'BBcom'
        };

        const statusColors = {
            'Pass': '#34a853',
            'Fail': '#ea4335',
            'Blocked': '#fbbc04',
            'Re-test': '#9c27b0',
            'In Progress': '#ff69b4',
            'Not Run': '#64748b'
        };

        async function loadDashboard() {
            // Update header with project name
            const projectName = projectNames[currentProject] || currentProject;
            document.getElementById('dashboardTitle').textContent = `${projectName} - Dashboard`;
            document.getElementById('dashboardSubtitle').textContent = `Visual insights for ${projectName} test cycle`;
            document.getElementById('backToSheet').href = `test_case_sheet.html?project=${currentProject}`;
            document.title = `${projectName} - Dashboard`;

            let data;
            try {
                const response = await fetch(`/api/test-cases?projectId=${currentProject}`);
                if (!response.ok) throw new Error('API request failed');
                data = await response.json();
            } catch (err) {
                console.error('Failed to fetch from API:', err);
                alert("Failed to load test data from database.");
                return;
            }

            // 1. Calculate Summary Stats
            const stats = {
                total: data.length,
                passed: 0,
                failed: 0,
                blocked: 0,
                inProgress: 0,
                untested: 0
            };

            const featureMap = {};

            data.forEach(tc => {
                // Update overall stats
                if (tc.status === 'Pass') stats.passed++;
                else if (tc.status === 'Fail') stats.failed++;
                else if (tc.status === 'Blocked') stats.blocked++;
                else if (tc.status === 'In Progress') stats.inProgress++;
                else stats.untested++;

                // Track by feature
                const feat = tc.feature || 'Unknown';
                if (!featureMap[feat]) {
                    featureMap[feat] = { total: 0, passed: 0, failed: 0 };
                }
                featureMap[feat].total++;
                if (tc.status === 'Pass') featureMap[feat].passed++;
                if (tc.status === 'Fail') featureMap[feat].failed++;
            });

            // 2. Render Cards
            const summaryGrid = document.getElementById('summaryGrid');
            summaryGrid.innerHTML = `
                <div class="stat-card total">
                    <div class="stat-value" style="color: #38bdf8">${stats.total}</div>
                    <div class="stat-label">Total Cases</div>
                </div>
                <div class="stat-card passed">
                    <div class="stat-value" style="color: var(--passed)">${stats.passed}</div>
                    <div class="stat-label">Passed</div>
                </div>
                <div class="stat-card failed">
                    <div class="stat-value" style="color: var(--failed)">${stats.failed}</div>
                    <div class="stat-label">Failed</div>
                </div>
                <div class="stat-card blocked">
                    <div class="stat-value" style="color: var(--blocked)">${stats.blocked}</div>
                    <div class="stat-label">Blocked</div>
                </div>
                <div class="stat-card in-progress">
                    <div class="stat-value" style="color: var(--in-progress)">${stats.inProgress}</div>
                    <div class="stat-label">In Progress</div>
                </div>
            `;

            // 3. Status Chart (Doughnut) - Dark Theme
            const ctxStatus = document.getElementById('statusChart').getContext('2d');
            new Chart(ctxStatus, {
                type: 'doughnut',
                data: {
                    labels: ['Passed', 'Failed', 'Blocked', 'In Progress', 'Untested'],
                    datasets: [{
                        data: [stats.passed, stats.failed, stats.blocked, stats.inProgress, stats.untested],
                        backgroundColor: [
                            statusColors['Pass'],
                            statusColors['Fail'],
                            statusColors['Blocked'],
                            statusColors['In Progress'],
                            statusColors['Not Run']
                        ],
                        borderWidth: 0
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                padding: 20,
                                color: '#94a3b8',
                                font: { size: 12 }
                            }
                        }
                    },
                    cutout: '70%'
                }
            });

            // 4. Feature Chart (Bar) - Dark Theme
            const featureLabels = Object.keys(featureMap);
            const featurePassed = featureLabels.map(f => featureMap[f].passed);
            const featureFailed = featureLabels.map(f => featureMap[f].failed);
            const featureOther = featureLabels.map(f => featureMap[f].total - featureMap[f].passed - featureMap[f].failed);

            const ctxFeature = document.getElementById('featureChart').getContext('2d');
            new Chart(ctxFeature, {
                type: 'bar',
                data: {
                    labels: featureLabels,
                    datasets: [
                        { label: 'Passed', data: featurePassed, backgroundColor: statusColors['Pass'] },
                        { label: 'Failed', data: featureFailed, backgroundColor: statusColors['Fail'] },
                        { label: 'Other', data: featureOther, backgroundColor: '#374151' }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            stacked: true,
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            beginAtZero: true,
                            stacked: true,
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                color: '#94a3b8',
                                usePointStyle: true,
                                padding: 20
                            }
                        }
                    }
                }
            });

            // 5. Detailed Table
            const tb = document.getElementById('featureTableBody');
            featureLabels.forEach(f => {
                const fData = featureMap[f];
                const pct = fData.total > 0 ? ((fData.passed / fData.total) * 100).toFixed(0) : 0;
                tb.innerHTML += `
                    <tr>
                        <td><strong class="text-white">${f}</strong></td>
                        <td class="text-gray-300">${fData.total}</td>
                        <td style="color: var(--passed); font-weight: 600">${fData.passed}</td>
                        <td style="color: var(--failed); font-weight: 600">${fData.failed}</td>
                        <td class="text-accent-400 font-semibold">${pct}%</td>
                        <td>
                            <div class="progress-mini">
                                <div class="progress-bar" style="width: ${pct}%"></div>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        window.onload = loadDashboard;
    </script>
</body>

</html>
