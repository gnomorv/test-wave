version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: test-wave-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: test_case_db
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test_case_db -u root -p rootpassword --authenticationDatabase admin
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
